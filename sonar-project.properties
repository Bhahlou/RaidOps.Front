sonar.projectKey=Bhahlou_RaidOps.Front
sonar.organization=bhahlou

sonar.sources=src
sonar.exclusions=**/*.spec.ts,**/test-setup.ts,**/environments/**,**/*.model.ts
sonar.coverage.exclusions=**/*.routes.ts,**/main.ts,**/app.config.ts
sonar.cpd.exclusions=**/changelog-entries.data.ts
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.typescript.tsconfigPath=tsconfig.json

# Web:MouseEventWithoutKeyboardEquivalentCheck can't see past Angular component boundaries: it
# flags every (click) on <app-button>/<app-icon-button> as mouse-only, even though both always
# render a real native <button> (or <a routerLink>) internally, so Enter/Space already fire a
# native click that bubbles up to the very same (click) handler. With ~40 such call sites and
# zero real violations behind them, this is pure noise for our component-based architecture.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.html
