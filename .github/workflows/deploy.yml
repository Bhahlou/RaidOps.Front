name: Deploy

on:
  # Every push to next is an already-tagged snapshot promoted from dev (see
  # promote-to-next.yml) — always safe to (re)build the acceptance image.
  push:
    branches: [next]
    paths-ignore:
      - 'CHANGELOG.md'
      - '.release-please-manifest.json'
      - 'package.json'
  # A next → master promotion PR merging is the signal to deploy the
  # already-tagged content it carries (see prod-from-promotion below).
  pull_request:
    types: [closed]
  # A published release from the master hotfix lane deploys to production.
  release:
    types: [published]

jobs:
  # ── Acceptance : every push to next (always an already-tagged snapshot) ───
  acceptance:
    if: github.event_name == 'push' && github.ref == 'refs/heads/next'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Log in to GHCR
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push :acceptance
        id: build
        run: |
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}
          MANIFEST_VERSION=$(jq -r '.["."]' .release-please-manifest.json)
          # No sha suffix: next only ever receives whole, already-tagged cuts
          # from dev, so this version string is always distinct and exact.
          VERSION="v${MANIFEST_VERSION}-acceptance"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          docker build --build-arg BUILD_CONFIGURATION=acceptance --build-arg APP_VERSION="$VERSION" -t $IMAGE_NAME:acceptance .
          docker push $IMAGE_NAME:acceptance

      - name: Notify Discord (acceptance)
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_ACCEPTANCE_WEBHOOK_URL }}
          FULL_REPO: ${{ github.repository }}
          AUTHOR: ${{ github.actor }}
          MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          # First line of the squash commit = the conventional PR title
          DESC=$(echo "$MESSAGE" | head -n 1)
          # Extract the PR number from the squash title "(#NN)" → link to the PR
          # (fall back to the commit URL for a direct push without a PR)
          PR_NUMBER=$(echo "$DESC" | grep -oE '#[0-9]+' | tail -1 | tr -d '#')
          if [ -n "$PR_NUMBER" ]; then
            LINK="https://github.com/$FULL_REPO/pull/$PR_NUMBER"
          else
            LINK="$COMMIT_URL"
          fi

          # Conventional commit type → emoji (mirrors release-please-config.json sections)
          PREFIX=$(echo "$DESC" | grep -oE '^[a-z]+' || true)
          case "$PREFIX" in
            feat)     EMOJI="🚀" ;;
            fix)      EMOJI="🐛" ;;
            perf)     EMOJI="⚡" ;;
            refactor) EMOJI="🔧" ;;
            docs)     EMOJI="📚" ;;
            test)     EMOJI="✅" ;;
            build)    EMOJI="📦" ;;
            ci)       EMOJI="🤖" ;;
            chore)    EMOJI="🧹" ;;
            *)        EMOJI="🔹" ;;
          esac

          # Strip the "type(scope)?: " prefix and trailing " (#NN)" PR reference
          CLEAN_TITLE=$(echo "$DESC" | sed -E 's/^[a-z]+(\([^)]*\))?!?: //; s/ \(#[0-9]+\)$//')
          DESCRIPTION="$EMOJI $CLEAN_TITLE"$'\n\n'"Click this notification title to get more detail of the change in PR."

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "RaidOps frontend — $AUTHOR pushed a new version to acceptance: $VERSION" \
              --arg desc "$DESCRIPTION" \
              --arg url "$LINK" \
              '{
                embeds: [{
                  title: $title,
                  description: $desc,
                  url: $url,
                  color: 3447003,
                  footer: { text: "Update is on its way to acceptance. Discord will notify when live." }
                }]
              }')"

  # ── Production (hotfix lane) : release cut directly on master ─────────────
  prod-from-hotfix-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # release.target_commitish is the raw commit SHA, not a branch name —
      # ask GitHub which branch(es) currently have that SHA as their tip.
      - name: Check this release was cut on master
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.release.target_commitish }}
        run: |
          BRANCHES=$(gh api "repos/${{ github.repository }}/commits/$SHA/branches-where-head" --jq '.[].name')
          if echo "$BRANCHES" | grep -qx "master"; then
            echo "is_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_master=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout released tag
        if: steps.check.outputs.is_master == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Log in to GHCR
        if: steps.check.outputs.is_master == 'true'
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push :latest + version tag
        if: steps.check.outputs.is_master == 'true'
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}
          docker build --build-arg APP_VERSION="$VERSION" -t $IMAGE_NAME:latest -t $IMAGE_NAME:$VERSION .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$VERSION

      - name: Notify Discord (production)
        if: steps.check.outputs.is_master == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_PROD_WEBHOOK_URL }}
          SHORT_REPO: ${{ github.event.repository.name }}
          TAG: ${{ github.event.release.tag_name }}
          AUTHOR: ${{ github.actor }}
          BODY: ${{ github.event.release.body }}
          URL: ${{ github.event.release.html_url }}
        run: |
          # release-please already generated a markdown changelog with clickable links
          DESC=$(echo "$BODY" | head -c 4000)
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "🚀 $SHORT_REPO — $AUTHOR pushed release $TAG" \
              --arg desc "$DESC" \
              --arg url "$URL" \
              '{
                embeds: [{
                  title: $title,
                  description: $desc,
                  url: $url,
                  color: 16750848,
                  footer: { text: "Rolling out to production…" }
                }]
              }')"

  # ── Production (promotion lane) : next → master PR merged ─────────────────
  # No SHA/tag matching needed here: by the time this PR merges, the release
  # was already published when cut on dev — we just look it up by version.
  prod-from-promotion:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'next'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout master
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
        with:
          ref: master

      - name: Look up the release matching the promoted version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST_VERSION=$(jq -r '.["."]' .release-please-manifest.json)
          PKG_NAME=$(jq -r '.name' package.json)
          TAG="${PKG_NAME}-v${MANIFEST_VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$(gh release view "$TAG" --json url -q .url)" >> "$GITHUB_OUTPUT"
          {
            echo "body<<RELEASE_BODY_EOF"
            gh release view "$TAG" --json body -q .body
            echo "RELEASE_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push :latest + version tag
        env:
          VERSION: ${{ steps.check.outputs.tag }}
        run: |
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}
          docker build --build-arg APP_VERSION="$VERSION" -t $IMAGE_NAME:latest -t $IMAGE_NAME:$VERSION .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$VERSION

      - name: Notify Discord (production)
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_PROD_WEBHOOK_URL }}
          SHORT_REPO: ${{ github.event.repository.name }}
          TAG: ${{ steps.check.outputs.tag }}
          AUTHOR: ${{ github.actor }}
          BODY: ${{ steps.check.outputs.body }}
          URL: ${{ steps.check.outputs.url }}
        run: |
          # release-please already generated a markdown changelog with clickable links
          DESC=$(echo "$BODY" | head -c 4000)
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "🚀 $SHORT_REPO — $AUTHOR pushed release $TAG" \
              --arg desc "$DESC" \
              --arg url "$URL" \
              '{
                embeds: [{
                  title: $title,
                  description: $desc,
                  url: $url,
                  color: 16750848,
                  footer: { text: "Rolling out to production…" }
                }]
              }')"
