name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate conventional PR title
    runs-on: ubuntu-latest
    steps:
      # Checks that PR title follows conventional-commits convention
      # (feat:, fix:, chore:, ...). As we squash-merge with title as
      # commit message, that's the one being read by release-please to calculate version.
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
