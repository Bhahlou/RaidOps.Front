<nav class="manual-sidebar" [class.is-open]="isOpen()">
  <button class="back-link" (click)="goBack()">
    <span class="material-icons">arrow_back</span>
    {{ 'manual.back' | transloco }}
  </button>

  @for (category of categories; track category.id) {
    <div class="section">
      <button class="section-header" (click)="toggleCategory(category.id)">
        @if (category.icon === 'discord') {
          <app-discord-brand-icon class="section-icon" [size]="20" />
        } @else {
          <span class="material-icons section-icon">{{ category.icon }}</span>
        }
        <span class="section-name">{{ category.labelKey | transloco }}</span>
        <span class="material-icons section-chevron">
          {{ openCategoryIds().has(category.id) ? 'expand_less' : 'expand_more' }}
        </span>
      </button>

      @if (openCategoryIds().has(category.id)) {
        @for (article of category.articles; track article.id) {
          <a
            class="sidebar-item"
            [routerLink]="['/manual', category.id, article.id]"
            routerLinkActive="active-link"
            (click)="onArticleClick()"
          >
            {{ article.labelKey | transloco }}
          </a>
        }
      }
    </div>
  }
</nav>
