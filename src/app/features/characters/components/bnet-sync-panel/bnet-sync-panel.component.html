@if (isLoadingBranches() || step() === 'authenticating' || step() === 'syncing') {
  <app-dialog-state
    variant="loading"
    [message]="(step() === 'syncing' ? 'characters.sync.syncing' : 'characters.sync.authenticating') | transloco"
  />

} @else if (step() === 'error') {
  <app-dialog-state variant="error" icon="error_outline" [message]="'characters.sync.error' | transloco" />

} @else {
  <p class="step-desc">{{ 'characters.sync.branchDesc' | transloco }}</p>
  <div class="branch-grid">
    @for (branch of branches(); track branch.id) {
      <button
        [class]="'branch-card branch-card--' + branch.currentExpansionShortCode.toLowerCase()"
        (click)="selectBranch(branch)">
        <div class="branch-card__bg" aria-hidden="true"></div>
        <div class="branch-card__content">
          <span class="branch-name">{{ branch.name }}</span>
          <span class="branch-expansion">{{ branch.currentExpansionShortCode }}</span>
        </div>
        <span class="material-icons branch-card__arrow">arrow_forward</span>
      </button>
    }
  </div>
}
