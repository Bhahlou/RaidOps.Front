<h2 mat-dialog-title>{{ 'characters.card.deactivateConfirm.title' | transloco }}</h2>

<mat-dialog-content>
  <p>{{ 'characters.card.deactivateConfirm.body' | transloco }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">
    {{ 'characters.card.deactivateConfirm.cancel' | transloco }}
  </button>
  <button mat-flat-button class="btn-danger" (click)="confirm()">
    {{ 'characters.card.deactivateConfirm.confirm' | transloco }}
  </button>
</mat-dialog-actions>
