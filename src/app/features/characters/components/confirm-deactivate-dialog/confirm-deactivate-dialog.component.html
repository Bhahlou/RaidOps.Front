<h2 class="dialog-title">{{ 'characters.card.deactivateConfirm.title' | transloco }}</h2>

<div class="dialog-content">
  <p>{{ 'characters.card.deactivateConfirm.body' | transloco }}</p>
</div>

<div class="dialog-actions">
  <app-button variant="text" (click)="cancel()">
    {{ 'characters.card.deactivateConfirm.cancel' | transloco }}
  </app-button>
  <app-button variant="danger" (click)="confirm()">
    {{ 'characters.card.deactivateConfirm.confirm' | transloco }}
  </app-button>
</div>
