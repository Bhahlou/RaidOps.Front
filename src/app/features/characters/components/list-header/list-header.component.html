<app-page-header [items]="breadcrumbs()" [manualLink]="{ category: 'getting-started', article: 'create-character' }">
  <div class="actions">
    @if (!isBnetLoading()) {
      @if (isBnetLinked()) {
        <div class="actions-wide">
          <app-button variant="primary" icon="download" (click)="openImport.emit()">
            {{ 'characters.list.importButton' | transloco }}
          </app-button>
          <div class="bnet-chip">
            <app-bnet-icon class="logo" [size]="15" />
            <span>{{ bnetAccount()!.battleTag }}</span>
            <span class="fi fi-{{ regionFlags[bnetAccount()!.region] }} flag"></span>
          </div>
        </div>
        <button
          type="button"
          class="icon-btn actions-narrow-trigger"
          [cdkMenuTriggerFor]="actionsMenu"
          [attr.aria-label]="'characters.list.actionsMenu' | transloco"
        >
          <span class="material-icons">more_vert</span>
        </button>
      } @else {
        <app-bnet-link-button (regionSelected)="linkBnet.emit($event)">
          {{ 'characters.bnet.linkButton' | transloco }}
        </app-bnet-link-button>
      }
    }
  </div>
</app-page-header>

<ng-template #actionsMenu>
  <div class="menu-panel" cdkMenu>
    <div class="menu-bnet-status">
      <app-bnet-icon class="logo" [size]="14" />
      <span>{{ 'characters.bnet.connectedAs' | transloco }}</span>
      <strong>{{ bnetAccount()!.battleTag }}</strong>
      <span class="fi fi-{{ regionFlags[bnetAccount()!.region] }} flag"></span>
    </div>
    <button type="button" class="menu-item" cdkMenuItem (click)="openImport.emit()">
      <span class="material-icons">download</span>
      {{ 'characters.list.importButton' | transloco }}
    </button>
  </div>
</ng-template>
