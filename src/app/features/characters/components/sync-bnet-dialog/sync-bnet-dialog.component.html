<h2 mat-dialog-title>{{ 'characters.sync.title' | transloco }}</h2>

<mat-dialog-content>
  <app-bnet-sync-panel [region]="data.region" (synced)="onSynced()" />
</mat-dialog-content>

<mat-dialog-actions align="end">
  @if (panel().step() === 'error') {
    <button mat-button (click)="panel().retry()">{{ 'characters.sync.retry' | transloco }}</button>
  }
  <button mat-button mat-dialog-close>{{ 'characters.import.cancel' | transloco }}</button>
</mat-dialog-actions>
