<h2 mat-dialog-title>{{ 'characters.import.title' | transloco }}</h2>

<mat-dialog-content>
  <app-character-activation-panel
    (activated)="dialogRef.close($event)"
    (activateError)="dialogRef.close({ error: true })"
    (openSyncRequested)="dialogRef.close({ openSync: true })"
  />
</mat-dialog-content>

<mat-dialog-actions>
  <div class="actions-left">
    <button mat-stroked-button (click)="panel().openSync()" [disabled]="panel().isActivating()">
      <mat-icon>sync</mat-icon>
      {{ 'characters.bnet.syncButton' | transloco }}
    </button>
    <span class="sync-hint">{{ 'characters.import.syncHint' | transloco }}</span>
  </div>
  <div class="actions-right">
    <button mat-button mat-dialog-close [disabled]="panel().isActivating()">
      {{ 'characters.import.cancel' | transloco }}
    </button>
    @if (panel().loadState() === 'idle' && !panel().allAlreadyActive() && panel().characters().length > 0) {
      <button
        mat-flat-button
        [disabled]="panel().selectedCount() === 0 || panel().isActivating()"
        (click)="panel().activate()">
        @if (panel().isActivating()) {
          <mat-spinner [diameter]="16" />
        } @else {
          {{ 'characters.import.importButton' | transloco : { count: panel().selectedCount() } }}
        }
      </button>
    }
  </div>
</mat-dialog-actions>
