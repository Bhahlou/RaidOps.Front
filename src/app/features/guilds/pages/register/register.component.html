<app-page-header [items]="breadcrumbs()" [manualLink]="{ category: 'guild', article: 'register' }" />

<div class="register-container">

  @if (loading()) {
    <div class="loading-state">
      <span class="spinner loading-spinner"></span>
    </div>
  } @else if (guild(); as guild) {

    <app-icon-card icon="smart_toy" [title]="'register.title' | transloco">

      <!-- Guild preview -->
      <div class="guild-preview">
        <div class="guild-icon">
          <app-discord-icon [id]="guild.id" [hash]="guild.iconHash" [type]="DiscordIconType.Guild" />
        </div>
        <span class="guild-name">{{ guild.name }}</span>
      </div>

      <!-- Stepper -->
      <app-stepper-header
        class="register-stepper"
        [activeIndex]="stepIndex()"
        [steps]="[
          { label: 'register.steps.invite' | transloco, completed: guild.isRegistered },
          { label: 'register.steps.settings' | transloco, completed: false },
        ]"
      />

      @if (stepIndex() === 0) {
        <!-- Step 1 — Invite bot -->
        <p class="description" [innerHTML]="'register.description' | transloco"></p>
        <div class="action">
          <app-button variant="primary" icon="add_circle" (click)="initiateRegistration()">
            {{ 'register.cta' | transloco }}
          </app-button>
        </div>
      } @else {
        <!-- Step 2 — Settings -->
        <app-guild-settings-form
          [guildId]="guild.id"
          (saved)="onSettingsSaved()"
        />
      }

    </app-icon-card>

  }

</div>
