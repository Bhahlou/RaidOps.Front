<h2 class="dialog-title">{{ 'roster.list.kickConfirmTitle' | transloco }}</h2>

<div class="dialog-content">
  <p>{{ 'roster.list.kickConfirmMessage' | transloco: { name: data.characterName } }}</p>
</div>

<div class="dialog-actions">
  <app-button variant="text" (click)="cancel()">
    {{ 'roster.list.kickConfirmCancel' | transloco }}
  </app-button>
  <app-button variant="danger" (click)="confirm()">
    {{ 'roster.list.kickConfirmAction' | transloco }}
  </app-button>
</div>
