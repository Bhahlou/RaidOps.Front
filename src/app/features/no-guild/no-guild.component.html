<div class="no-guild-container">

  @if (hasNoEligibleServer()) {
    <app-icon-card
      icon="shield_lock"
      [title]="'noGuild.noServer.title' | transloco"
    >
      <p [innerHTML]="'noGuild.noServer.description' | transloco"></p>
    </app-icon-card>

  } @else {
    <app-icon-card
      icon="add_circle"
      [title]="'noGuild.register.title' | transloco"
      [subtitle]="'noGuild.register.description' | transloco"
    >
      <table mat-table [dataSource]="adminGuilds()" class="guild-table">

        <ng-container matColumnDef="icon">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let guild">
            <div class="guild-icon">
              <app-discord-icon [id]="guild.id" [hash]="guild.iconHash" [type]="DiscordIconType.Guild" />
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>{{ 'noGuild.register.serverColumn' | transloco }}</th>
          <td mat-cell *matCellDef="let guild">{{ guild.name }}</td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let guild" class="action-cell">
            <a mat-stroked-button color="primary" [routerLink]="['/guild-register', guild.id]">
              {{ 'noGuild.register.action' | transloco }}
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
      </table>
    </app-icon-card>
  }

</div>
