@if (isResolving()) {
  <div class="get-started-loading">
    <span class="spinner loading-spinner"></span>
  </div>
} @else {
  <div class="get-started-container">
    <app-icon-card
      iconSrc="assets/Logo no background.svg"
      [title]="'getStarted.title' | transloco"
      [subtitle]="'getStarted.subtitle' | transloco"
    >
      <app-stepper-header
        class="get-started-stepper"
        [activeIndex]="stepIndex()"
        [steps]="[
          { label: 'getStarted.steps.discord' | transloco, completed: isAuthenticated() },
          { label: 'getStarted.steps.guild' | transloco, completed: isGuildStepDone() },
          { label: 'getStarted.steps.bnet' | transloco, completed: isBnetStepDone() },
          { label: 'getStarted.steps.link' | transloco, completed: isLinkStepDone() },
        ]"
      />

      @if (stepIndex() === 0) {
        @if (!isAuthenticated()) {
          <p class="step-desc">{{ 'getStarted.discordStep.description' | transloco }}</p>
          <div class="discord-button-row">
            <app-button variant="primary" [extraClass]="'discord-button'" (click)="signup()">
              <app-discord-brand-icon [size]="20" />
              {{ 'getStarted.discordStep.cta' | transloco }}
            </app-button>
          </div>
        }
      } @else if (stepIndex() === 1) {
        <app-get-started-guild-step (continue)="continuePastGuildStep()" />
      } @else if (stepIndex() === 2) {
        <app-get-started-bnet-step />
      } @else if (stepIndex() === 3) {
        <app-get-started-link-step />
      }
    </app-icon-card>
  </div>
}
