<mat-toolbar>
  <div routerLink="/" class="logo-wrapper">
    <img [src]="envBranding.logoPath" alt="RaidOps Logo" class="logo" />
    <span [style.color]="envBranding.accentColor">RaidOps</span>
    @if (envBranding.badgeLabel) {
      <span class="env-badge" [style.background-color]="envBranding.accentColor">
        {{ envBranding.badgeLabel }}
      </span>
    }
  </div>

  <span class="spacer"></span>

  @if (isAuthenticated()) {
    <app-notification-bell />
  }

  <app-lang-selector />

  <div class="user-trigger" [matMenuTriggerFor]="userMenu">
    @if (user()?.name) {
      <span class="user-name">{{ user()?.name }}</span>
    }
    @if (user()?.discordId) {
      <app-discord-icon [type]="iconType" [id]="user()?.discordId!" [hash]="user()?.avatarHash" />
    } @else {
      <mat-icon class="user-avatar-icon">account_circle</mat-icon>
    }
  </div>

  <mat-menu #userMenu="matMenu">
    @if (isAuthenticated()) {
      <button mat-menu-item (click)="onLogoutClick()">
        <mat-icon>logout</mat-icon>
        {{ 'header.logout' | transloco }}
      </button>
    } @else {
      <button mat-menu-item (click)="onLoginClick()">
        <mat-icon>login</mat-icon>
        {{ 'header.login' | transloco }}
      </button>
    }
  </mat-menu>
</mat-toolbar>
