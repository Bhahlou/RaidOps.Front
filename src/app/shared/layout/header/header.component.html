<mat-toolbar>
  <div routerLink="/" class="logo-wrapper">
    <img src="assets/Logo no background.svg" alt="RaidOps Logo" class="logo" />
    <span>RaidOps</span>
    @if (!isProd) {
      <span class="env-badge">Dev</span>
    }
  </div>

  <span class="spacer"></span>

  <app-lang-selector />

  <div class="user-trigger" [matMenuTriggerFor]="userMenu">
    @if (user()?.name) {
      <span class="user-name">{{ user()?.name }}</span>
    }
    <button mat-icon-button>
      @if (user()?.discordId) {
        <app-discord-icon [type]="iconType" [id]="user()?.discordId!" [hash]="user()?.avatarHash" />
      } @else {
        <mat-icon>account_circle</mat-icon>
      }
    </button>
  </div>

  <mat-menu #userMenu="matMenu">
    @if (isAuthenticated()) {
      <button mat-menu-item (click)="onLogoutClick()">
        <mat-icon>logout</mat-icon>
        {{ 'header.logout' | transloco }}
      </button>
    } @else {
      <button mat-menu-item (click)="onLoginClick()">
        <mat-icon>login</mat-icon>
        {{ 'header.login' | transloco }}
      </button>
    }
  </mat-menu>
</mat-toolbar>
