<button mat-icon-button class="lang-button" [matMenuTriggerFor]="langMenu">
  <span class="fi fi-{{ langFlags[activeLang] ?? activeLang }}"></span>
</button>

<mat-menu #langMenu="matMenu">
  @for (lang of availableLangs; track lang) {
    <button mat-menu-item (click)="setLang(lang)" [class.active-lang]="lang === activeLang">
      <span class="fi fi-{{ langFlags[lang] ?? lang }} menu-flag"></span>
      {{ langLabels[lang] ?? lang.toUpperCase() }}
    </button>
  }
</mat-menu>
