<div class="avatar-wrapper" [style.width.px]="size()" [style.height.px]="size()">
  @if (!url) {
    <mat-icon [style.font-size.px]="size()">account_circle</mat-icon>
  }
  @if (url) {
    <img
      [ngSrc]="url"
      [alt]="'Discord icon'"
      [width]="size()"
      [height]="size()"
      [style.width.px]="size()"
      [style.height.px]="size()"
    />
  }
</div>
