server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml font/woff2;

    # Assets hashés par Angular → cache long terme
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Traductions Transloco (public/assets/i18n/*.json) — pas hashées par Angular, donc
    # l'URL ne change jamais entre deux déploiements. Sans ceci elles tombent sur le bloc
    # SPA par défaut (pas de Cache-Control explicite → cache heuristique navigateur), et un
    # utilisateur peut récupérer un JS fraîchement déployé référençant de nouvelles clés
    # i18n pendant que son navigateur sert encore l'ancien fichier de traduction en cache.
    location ^~ /assets/i18n/ {
        add_header Cache-Control "no-cache";
    }

    # Proxy vers le back .NET
    # "raidops-api" = nom du service dans docker-compose.yml
    # X-Forwarded-Proto forcé à https : le TLS est terminé au NAS, ce conteneur
    # ne voit que du HTTP — sans ce header le back génèrerait des URLs en http://
    location /api/ {
        proxy_pass         http://raidops-api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Callback OAuth2 Discord — géré par le middleware ASP.NET, pas par Angular
    location /signin-discord {
        proxy_pass         http://raidops-api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # SPA fallback — toutes les routes Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
